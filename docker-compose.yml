# docker-compose.yml — SupportFlow

services:
  postgres:
    image: postgres:16-alpine
    container_name: sf_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-support_flow}
    ports:
      - "${DB_PORT:-3002}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sf_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-support_flow}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sf_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-3003}:6379"
    networks:
      - sf_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis_data:/data  

  api:
    build:
      context: . #El dockerfile debe ser relativo al context, o usa path absoluto desde la raíz
      dockerfile: ./docker/api/Dockerfile
    container_name: sf_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MOCKSERVER_URL: http://mockserver:1080
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./api:/app
      - /app/node_modules
    networks:
      - sf_network
    healthcheck:
      #test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health |
      test: ["CMD-SHELL", "nc -z localhost 3000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    build:
      context: . #El dockerfile debe ser relativo al context, o usa path absoluto desde la raíz
      dockerfile: ./docker/web/Dockerfile
    container_name: sf_web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3001}:5173"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      #VITE_HOST: 0.0.0.0
      #VITE_PORT: 5173
      #VITE_API_URL: http://localhost:${BACKEND_PORT:-3000}
    volumes:
      - ./web:/app
      - /app/node_modules
    networks:
      - sf_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: sf_mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_UI_PORT:-3004}:8025"
      - "${MAILPIT_SMTP_PORT:-3005}:1025"
    networks:
      - sf_network

  mockserver:
    image: mockserver/mockserver:latest
    container_name: sf_mockserver
    restart: unless-stopped
    ports:
      - "${MOCKSERVER_PORT:-1080}:1080"
    environment:
      MOCKSERVER_INITIALIZATION_JSON_PATH: /config/expectations
    volumes:
      - ./mockserver:/config
    networks:
      - sf_network

networks:
  sf_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: