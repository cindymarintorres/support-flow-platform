# docker-compose.yml — SupportFlow (Optimizado para Dev)

services:
  postgres:
    image: postgres:16-alpine
    container_name: sf_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-support_flow}
    ports:
      - "${DB_PORT:-3002}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sf_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-support_flow}"]
      interval: 10s
      timeout: 5s
      retries: 5 # Reducido para no esperar en vano si falla rápido

  redis:
    image: redis:7-alpine
    container_name: sf_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-3003}:6379"
    networks:
      - sf_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data  

  api:
    build:
      context: .
      dockerfile: ./docker/api/Dockerfile
    container_name: sf_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_PORT:-3000}
      DATABASE_URL: ${DATABASE_URL_DOCKER}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MOCKSERVER_URL: ${MOCKSERVER_URL}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./api:/app
      #- /app/node_modules # Evita sobreescribir los módulos de Linux con los de tu host (importante para bcrypt/prisma)
    networks:
      - sf_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s #Da 60 segundos a NestJS para compilar sin reportar error fatal

  web:
    build:
      context: .
      dockerfile: ./docker/web/Dockerfile
    container_name: sf_web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started #React arranca apenas el contenedor de API inicie, sin esperar a que Nest compile
    ports:
      - "${WEB_PORT:-3001}:5173"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      VITE_API_URL: http://localhost:${API_PORT:-3000} # Habilitado para que Vite sepa dónde hablar
    volumes:
      - ./web:/app
      - /app/node_modules # Igual que en API, protege dependencias nativas
    networks:
      - sf_network
    # El healthcheck en Vite de dev no es estrictamente necesario, pero lo mantenemos con start_period
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  mailpit:
    image: axllent/mailpit:latest
    container_name: sf_mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_UI_PORT:-3004}:8025"
      - "${MAILPIT_SMTP_PORT:-3005}:1025"
    networks:
      - sf_network

  mockserver:
    image: mockserver/mockserver:latest
    container_name: sf_mockserver
    restart: unless-stopped
    ports:
      - "${MOCKSERVER_PORT:-1080}:1080"
    environment:
      MOCKSERVER_INITIALIZATION_JSON_PATH: /config/expectations
    volumes:
      - ./mockserver:/config
    networks:
      - sf_network

networks:
  sf_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: